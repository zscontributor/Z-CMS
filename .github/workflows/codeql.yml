name: CodeQL

# Static application security testing. The scanner heuristics in @zcmsorg/scanner
# guard the packages we RUN from third parties; this guards the code WE write —
# the trust boundaries themselves (RLS scoping, the auth guard, the plugin gateway,
# the theme loader). CodeQL reads the whole call graph, so it catches classes of
# bug — injection, unsafe deserialization, missing authz on a path — that neither
# typecheck nor a unit test is shaped to find.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so a newly-published CodeQL query finds an old bug even with no push.
    - cron: "0 3 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-and-quality is the broader suite; use security-extended if the
          # quality noise ever drowns the security findings.
          queries: security-and-quality

      # No compiled languages here, so autobuild is a no-op — kept for the standard
      # shape and so adding a compiled language later needs no workflow change.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
